<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SWU Draft Replay</title>
<style>
  :root{
    --bg:#0d1420; --panel:#141d2e; --panel-2:#1b2740; --edge:#2b3a57;
    --ink:#e6ecf6; --ink-dim:#8ea3c4; --ink-faint:#5f7396;
    --cyan:#4fd6e6; --amber:#ffb454; --shadow:0 6px 24px rgba(0,0,0,.35);
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:
      radial-gradient(1200px 600px at 70% -10%, #16233a 0%, transparent 60%),
      var(--bg);
    color:var(--ink);font-family:var(--sans);line-height:1.45;
    -webkit-font-smoothing:antialiased;padding:18px}
  a{color:var(--cyan)}
  .wrap{max-width:1200px;margin:0 auto}

  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  h1{font-size:19px;font-weight:650;letter-spacing:.2px;margin:0}
  .set-tag{font-family:var(--mono);font-size:12px;color:var(--cyan);
    border:1px solid var(--edge);border-radius:999px;padding:2px 9px}
  .subtitle{color:var(--ink-dim);font-size:13px;margin-left:auto}

  /* ---- scrubber ---- */
  .console{background:var(--panel);border:1px solid var(--edge);border-radius:14px;
    padding:14px 16px;box-shadow:var(--shadow);margin-bottom:14px}
  .scrub-row{display:flex;align-items:center;gap:12px}
  .pos{font-family:var(--mono);font-size:13px;color:var(--ink-dim);min-width:150px}
  .pos b{color:var(--ink);font-weight:600}
  input[type=range]{flex:1;accent-color:var(--cyan);height:22px}
  button{font:inherit;color:var(--ink);background:var(--panel-2);
    border:1px solid var(--edge);border-radius:9px;padding:6px 11px;cursor:pointer}
  button:hover{border-color:var(--cyan)}
  button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .hint{color:var(--ink-dim);font-size:12px;margin-top:9px}

  /* ---- seat strip ---- */
  .seats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .pass{font-family:var(--mono);font-size:12px;color:var(--ink-dim);
    display:flex;align-items:center;gap:5px}
  .pass .arrow{color:var(--cyan);font-size:15px}
  .seat{background:var(--panel);border:1px solid var(--edge);border-radius:10px;
    padding:7px 11px;cursor:pointer;display:flex;flex-direction:column;gap:2px;min-width:70px}
  .seat:hover{border-color:var(--cyan)}
  .seat.active{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan) inset,
    0 4px 14px rgba(79,214,230,.18)}
  .seat .who{font-size:12px;color:var(--ink-dim);display:flex;align-items:center;gap:4px}
  .seat .cnt{font-family:var(--mono);font-size:15px;color:var(--ink);font-weight:600}
  .star{color:var(--amber)}

  /* ---- panels ---- */
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media (max-width:760px){.panels{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--edge);border-radius:14px;
    padding:14px 15px;box-shadow:var(--shadow)}
  .panel h2{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;
    color:var(--ink-dim);margin:0 0 3px}
  .panel .meta{font-family:var(--mono);font-size:12px;color:var(--ink-faint);margin-bottom:12px}
  .panel .meta b{color:var(--cyan);font-weight:600}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));
    gap:9px;align-items:start}
  .card{position:relative;border-radius:9px;overflow:hidden;border:1px solid var(--edge);
    background:var(--panel-2);aspect-ratio:auto;transition:transform .12s ease,border-color .12s ease}
  .card img{display:block;width:100%;height:auto}
  .card:hover{transform:translateY(-3px);border-color:var(--cyan)}
  .card.picked{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber) inset,
    0 6px 18px rgba(255,180,84,.25)}
  .card .tag{position:absolute;top:5px;left:5px;font-family:var(--mono);font-size:10px;
    font-weight:700;letter-spacing:.5px;color:#1a1206;background:var(--amber);
    padding:2px 6px;border-radius:5px}
  .card .fallback{padding:10px;font-family:var(--mono);font-size:11px;color:var(--ink-dim);
    aspect-ratio:5/7;display:flex;align-items:center;justify-content:center;text-align:center}
  .empty{color:var(--ink-faint);font-size:13px;padding:8px 2px}

  .leaders{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .leaders .lead{font-family:var(--mono);font-size:11px;color:var(--ink-dim);
    border:1px solid var(--edge);border-radius:6px;padding:2px 7px}

  /* ---- pool filter/sort ---- */
  .pool-tools{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:0 0 12px}
  .aspects{display:flex;flex-wrap:wrap;gap:5px}
  .asp{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-dim);
    background:var(--panel-2);border:1px solid var(--edge);border-radius:999px;
    padding:3px 9px 3px 7px;cursor:pointer;user-select:none}
  .asp:hover{border-color:var(--cyan)}
  .asp .dot{width:10px;height:10px;border-radius:50%;background:var(--asp-color);
    box-shadow:0 0 0 1px rgba(255,255,255,.18) inset}
  .asp.off{opacity:.42;text-decoration:line-through}
  .asp.off .dot{filter:grayscale(1) brightness(.7)}
  .sort-toggle{margin-left:auto;font-size:11px;padding:4px 10px}
  .type-group{margin-top:12px}
  .type-group:first-child{margin-top:0}
  .type-head{font-family:var(--mono);font-size:11px;letter-spacing:.6px;text-transform:uppercase;
    color:var(--ink-faint);margin:0 0 7px}
  .type-head .n{color:var(--ink-dim);margin-left:2px}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="wrap">
  <header>
    <h1>Draft Replay</h1>
    <span class="set-tag" id="setTag">SET</span>
    <span class="subtitle" id="dateTag"></span>
  </header>

  <div class="console">
    <div class="scrub-row">
      <button id="prev" aria-label="Previous pick">◂ Prev</button>
      <button id="play" aria-label="Play">▶ Play</button>
      <button id="next" aria-label="Next pick">Next ▸</button>
      <span class="pos" id="pos">Round – · Pick –</span>
      <input type="range" id="slider" min="0" value="0" aria-label="Draft position">
    </div>
    <div class="hint">Drag the timeline or step through picks. Choose a seat below to follow that player. The amber card is what they took from the pile.</div>
  </div>

  <div class="seats">
    <span class="pass" id="pass"></span>
    <div id="seatStrip" style="display:contents"></div>
  </div>

  <div class="panels">
    <section class="panel">
      <h2>Choosing from</h2>
      <div class="meta" id="pileMeta"></div>
      <div class="grid" id="pile"></div>
    </section>
    <section class="panel">
      <h2 id="poolTitle">Pool</h2>
      <div class="meta" id="poolMeta"></div>
      <div class="pool-tools" id="poolTools" hidden>
        <div class="aspects" id="aspectToggles"></div>
        <button class="sort-toggle" id="poolSort" aria-label="Toggle pool sorting">Cost · type</button>
      </div>
      <div class="leaders" id="leaders"></div>
      <div id="pool"></div>
    </section>
  </div>
</div>

<script>
/* =========================================================================
   1) DATA  —  swu-draft-dataformat.md schema: { draft, packs, picks }
   Loading order (see the bottom of this file):
     • if DRAFT_OVERRIDE below is set, use it (needed for file:// double-click)
     • else fetch('draft-data.json') over a local server
     • else fall back to the built-in demo
   Filtering/sorting the pool also loads a local 'cards.json' (the swu-db set
   dump); without it the viewer still works, just without the filters.
   ▶ For file:// use, paste your exported object here:
       const DRAFT_OVERRIDE = { draft:{...}, packs:[...], picks:[...] };
   ========================================================================= */
const DRAFT_OVERRIDE = null;

/* =========================================================================
   2) IMAGE SOURCE  —  card id  ->  image URL.
   Default hotlinks swu-db by collector number ("SOR-082" -> .../sor/82).
   ▶ To use YOUR generated images:   return `./img/${cardId}.png`;
   ========================================================================= */
function cardImageUrl(cardId){
  const m = /^([A-Za-z]+)-0*(\d+)$/.exec(cardId);
  if(!m) return "";
  return `https://api.swu-db.com/cards/${m[1].toLowerCase()}/${m[2]}?format=image`;
}

/* =========================================================================
   3) DERIVATION  —  everything below is computed from packs + picks.
   Nothing about pools / piles / passes is stored; it's all a query.
   ========================================================================= */
let D, seats, N, boosterPicks, positions, focusSeat;
const packByKey = {};            // `${round}|${token}` -> pack
const pickByKey = {};            // `${round}|${pick}|${seat}` -> pick

function boot(data){
  D = data;
  seats = [...D.draft.seats].sort((a,b)=>a.seat-b.seat);
  N = seats.length;
  D.packs.forEach(p => packByKey[`${p.round}|${p.token}`] = p);
  D.picks.forEach(p => { if(p.phase!=="leader") pickByKey[`${p.round}|${p.pick}|${p.seat}`] = p; });

  boosterPicks = D.picks.filter(p => p.phase !== "leader");
  const posSet = new Map();
  boosterPicks.forEach(p => posSet.set(`${p.round}|${p.pick}`, {round:p.round, pick:p.pick}));
  positions = [...posSet.values()].sort((a,b)=> a.round-b.round || a.pick-b.pick);

  focusSeat = D.draft.config.protagonist_seat || seats[0].seat;

  // static chrome
  document.getElementById("setTag").textContent = D.draft.set || "SET";
  document.getElementById("dateTag").textContent = D.draft.date || "";
  const slider = document.getElementById("slider");
  slider.max = positions.length;   // one extra stop = "draft complete"
  buildSeatStrip();
  render();
}

// Which seat opened the pack a given seat holds at (round, pick).
// Prefer the recorded token; fall back to rotation from pass_directions.
function packFor(round, pick, seat){
  const rec = pickByKey[`${round}|${pick}|${seat}`];
  if(rec && rec.token != null) return packByKey[`${round}|${rec.token}`];
  const dir = (D.draft.config.pass_directions || {})[String(round)] || "left";
  const step = dir === "left" ? +1 : -1;      // convention: 'left' = pack moves toward lower seat index
  let idx = ((seat-1) + step*(pick-1)) % N; idx = ((idx%N)+N)%N;
  return packByKey[`${round}|${idx+1}`];
}

// The shrinking pile a seat sees: pack contents minus cards already taken from it this round.
function pileFor(round, pick, seat){
  const pack = packFor(round, pick, seat);
  if(!pack) return {cards:[], pack:null, picked:null};
  const gone = new Set();
  boosterPicks.forEach(p => {
    if(p.round===round && p.pick<pick && p.token===pack.token) gone.add(p.card);
  });
  const rec = pickByKey[`${round}|${pick}|${seat}`];
  return {
    cards: pack.cards.filter(c => !gone.has(c)),
    pack,
    picked: rec ? rec.card : null
  };
}

// A seat's pool as they sit down to make (round, pick): everything committed
// BEFORE this pick. The card being considered is not in the pool yet — it
// only joins once you advance. (Pass pick=Infinity to get the finished deck.)
function poolFor(round, pick, seat){
  return boosterPicks
    .filter(p => p.seat===seat && (p.round<round || (p.round===round && p.pick<pick)))
    .sort((a,b)=> a.round-b.round || a.pick-b.pick)
    .map(p => p.card);
}

function leadersFor(seat){
  return D.picks.filter(p => p.phase==="leader" && p.seat===seat).map(p=>p.card);
}

/* =========================================================================
   3b) CARD METADATA + POOL FILTER/SORT
   Metadata (aspects, cost, type) comes from a local cards.json — the swu-db
   set dump:  curl https://api.swu-db.com/cards/ash -o cards.json
   It only drives the pool's filters and sorting; card images still come from
   cardImageUrl(). Everything degrades gracefully if cards.json is absent.
   ========================================================================= */
const ASPECTS = [
  ["Vigilance","#3f83d1"], ["Command","#37a860"], ["Aggression","#d24b45"],
  ["Cunning","#e0b02a"], ["Heroism","#e9eef4"], ["Villainy","#141d2e"]
];
const TYPE_ORDER = ["Unit","Event","Upgrade","Leader","Base"];
const META = {};                 // canonical id -> { aspects:[...], cost:Number|null, type }
const hiddenAspects = new Set();
let poolSort = "pick";           // "type" = cost grouped by type, "pick" = draft order
let metaLoaded = false;
let currentPool = [];            // pick-ordered ids for the focused seat at the current stop

const canonId = id => { const m=/^([A-Za-z]+)-0*(\d+)$/.exec(id||""); return m?`${m[1].toUpperCase()}-${+m[2]}`:id; };

function buildMeta(json){
  const arr = Array.isArray(json) ? json : (json.data || json.cards || []);
  arr.forEach(c => {
    META[canonId(`${c.Set}-${c.Number}`)] = {
      aspects: (c.Aspects || []).map(a => String(a).trim()),
      cost: (c.Cost !== undefined && c.Cost !== "") ? parseInt(c.Cost, 10) : null,
      type: c.Type || "Unknown"
    };
  });
  metaLoaded = Object.keys(META).length > 0;
}

// A card is hidden only if one of its aspects is toggled off. Unknown cards
// (not in cards.json) are never hidden.
function visibleByAspect(id){
  if(!hiddenAspects.size) return true;
  const m = META[canonId(id)];
  if(!m) return true;
  return !m.aspects.some(a => hiddenAspects.has(a));
}

function buildAspectToggles(){
  const box = document.getElementById("aspectToggles");
  box.innerHTML = "";
  ASPECTS.forEach(([name,color]) => {
    const el = document.createElement("span");
    el.className = "asp"; el.tabIndex = 0; el.dataset.aspect = name;
    el.style.setProperty("--asp-color", color);
    el.innerHTML = `<span class="dot"></span>${name}`;
    const toggle = () => {
      hiddenAspects.has(name) ? hiddenAspects.delete(name) : hiddenAspects.add(name);
      el.classList.toggle("off", hiddenAspects.has(name));
      paintPool();
    };
    el.addEventListener("click", toggle);
    el.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }});
    box.appendChild(el);
  });
}

function typeRank(t){ const i = TYPE_ORDER.indexOf(t); return i<0 ? 99 : i; }

// Paint the pool from currentPool, applying the aspect filter and the sort mode.
function paintPool(){
  const node = document.getElementById("pool");
  node.innerHTML = "";
  const ids = currentPool.filter(visibleByAspect);
  const total = currentPool.length;
  document.getElementById("poolMeta").innerHTML =
    hiddenAspects.size ? `<b>${ids.length}</b> of ${total} cards` : `<b>${total}</b> cards`;
  if(!ids.length){
    node.innerHTML = `<div class="empty">${total ? "No cards match the current filters." : "Nothing here yet."}</div>`;
    return;
  }
  if(poolSort === "pick" || !metaLoaded){
    const g = document.createElement("div"); g.className = "grid";
    ids.forEach(id => g.appendChild(cardNode(id, null)));
    node.appendChild(g);
    return;
  }
  // grouped by type, sorted by cost within each group
  const groups = {};
  ids.forEach(id => { const t = (META[canonId(id)]||{}).type || "Unknown"; (groups[t]=groups[t]||[]).push(id); });
  Object.keys(groups)
    .sort((a,b) => typeRank(a)-typeRank(b) || a.localeCompare(b))
    .forEach(t => {
      const arr = groups[t].sort((a,b) => {
        const ca = META[canonId(a)]?.cost, cb = META[canonId(b)]?.cost;
        return (ca==null?Infinity:ca) - (cb==null?Infinity:cb) || canonId(a).localeCompare(canonId(b));
      });
      const wrap = document.createElement("div"); wrap.className = "type-group";
      const head = document.createElement("div"); head.className = "type-head";
      head.innerHTML = `${t}<span class="n">· ${arr.length}</span>`;
      const g = document.createElement("div"); g.className = "grid";
      arr.forEach(id => g.appendChild(cardNode(id, null)));
      wrap.appendChild(head); wrap.appendChild(g);
      node.appendChild(wrap);
    });
}

document.getElementById("poolSort").onclick = e => {
  poolSort = (poolSort === "type") ? "pick" : "type";
  e.target.textContent = (poolSort === "type") ? "Cost · type" : "Pick order";
  paintPool();
};

/* =========================================================================
   4) RENDER
   ========================================================================= */
let cursor = 0, timer = null;

function cardNode(id, picked){
  const el = document.createElement("div");
  el.className = "card" + (picked ? " picked" : "");
  const url = cardImageUrl(id);
  if(url){
    const img = new Image();
    img.loading = "lazy"; img.alt = id; img.src = url;
    img.onerror = () => { el.innerHTML = `<div class="fallback">${id}</div>` + (picked?el.querySelector('.tag')?.outerHTML||"":""); };
    el.appendChild(img);
  } else {
    el.innerHTML = `<div class="fallback">${id}</div>`;
  }
  if(picked){
    const tag = document.createElement("span");
    tag.className = "tag"; tag.textContent = "PICK";
    el.appendChild(tag);
  }
  return el;
}

function fillGrid(node, ids, pickedId, emptyMsg){
  node.innerHTML = "";
  if(!ids.length){ node.innerHTML = `<div class="empty">${emptyMsg || "Nothing here yet."}</div>`; return; }
  ids.forEach(id => node.appendChild(cardNode(id, id===pickedId)));
}

function buildSeatStrip(){
  const strip = document.getElementById("seatStrip");
  strip.innerHTML = "";
  seats.forEach(s => {
    const el = document.createElement("div");
    el.className = "seat"; el.tabIndex = 0; el.dataset.seat = s.seat;
    el.innerHTML = `<span class="who">${s.seat===D.draft.config.protagonist_seat?'<span class="star">★</span>':''}Seat ${s.seat}</span>
                    <span class="cnt" data-cnt>0</span>`;
    const pick = () => { focusSeat = s.seat; render(); };
    el.addEventListener("click", pick);
    el.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" "){ e.preventDefault(); pick(); }});
    strip.appendChild(el);
  });
}

function render(){
  const atEnd = cursor >= positions.length;              // terminal "draft complete" stop
  const base = positions[Math.min(cursor, positions.length - 1)];
  const round = base.round;
  const poolPick = atEnd ? Infinity : base.pick;         // Infinity => finished deck

  document.getElementById("pos").innerHTML = atEnd
    ? `<b>Draft complete</b>`
    : `Round <b>${base.round}</b> · Pick <b>${base.pick}</b>`;

  const dir = (D.draft.config.pass_directions || {})[String(round)] || "left";
  document.getElementById("pass").innerHTML = atEnd ? ""
    : `passing <span class="arrow">${dir==="left"?"◂":"▸"}</span> ${dir}`;

  // seat counts + active state (counts reflect the pool as of this moment)
  document.querySelectorAll(".seat").forEach(el => {
    const s = +el.dataset.seat;
    el.classList.toggle("active", s===focusSeat);
    el.querySelector("[data-cnt]").textContent = poolFor(round, poolPick, s).length;
  });

  // pile
  if(atEnd){
    document.getElementById("pileMeta").innerHTML = `draft finished`;
    fillGrid(document.getElementById("pile"), [], null, "Draft finished — full deck on the right.");
  } else {
    const pile = pileFor(base.round, base.pick, focusSeat);
    document.getElementById("pileMeta").innerHTML = pile.pack
      ? `pack opened by <b>seat ${pile.pack.opened_by_seat}</b> · <b>${pile.cards.length}</b> cards left`
      : `no pack`;
    fillGrid(document.getElementById("pile"), pile.cards, pile.picked);
  }

  // pool (everything committed before this pick; at the end, the whole deck)
  currentPool = poolFor(round, poolPick, focusSeat);
  document.getElementById("poolTitle").textContent =
    `${(seats.find(s=>s.seat===focusSeat)||{}).player || "Seat "+focusSeat} · pool`;
  const leads = leadersFor(focusSeat);
  document.getElementById("leaders").innerHTML = leads.length
    ? leads.map(l=>`<span class="lead">${l}</span>`).join("")
    : "";
  paintPool();

  document.getElementById("slider").value = cursor;
}

/* ---- navigation ---- */
function go(i){ cursor = Math.max(0, Math.min(positions.length, i)); render(); }
document.getElementById("prev").onclick = () => go(cursor-1);
document.getElementById("next").onclick = () => go(cursor+1);
document.getElementById("slider").oninput = e => go(+e.target.value);
document.getElementById("play").onclick = e => {
  if(timer){ clearInterval(timer); timer=null; e.target.textContent="▶ Play"; return; }
  e.target.textContent="⏸ Pause";
  timer = setInterval(() => {
    if(cursor >= positions.length){ clearInterval(timer); timer=null; e.target.textContent="▶ Play"; return; }
    go(cursor+1);
  }, 1200);
};
document.addEventListener("keydown", e => {
  if(e.key==="ArrowRight") go(cursor+1);
  if(e.key==="ArrowLeft")  go(cursor-1);
});

/* =========================================================================
   DEMO DATA GENERATOR  —  delete once you paste your own DRAFT_DATA.
   Produces a valid { draft, packs, picks } with consistent rotation so the
   pile reconstruction visibly works. Uses real SOR ids so images resolve.
   ========================================================================= */
function buildDemoDraft(){
  const NN=8, PACK=5, ROUND=1, dir="left";
  const st=[]; for(let s=1;s<=NN;s++) st.push({seat:s, player:`Player ${s}`});
  const packs=[]; let n=1;
  for(let o=1;o<=NN;o++){
    const cards=[]; for(let c=0;c<PACK;c++){ cards.push(`SOR-${String(n).padStart(3,"0")}`); n++; }
    packs.push({pack_id:`R${ROUND}-S${o}`, round:ROUND, opened_by_seat:o, token:o, cards:[...cards]});
  }
  const remaining={}; packs.forEach(p=>remaining[p.token]=[...p.cards]);
  const step = dir==="left"?+1:-1;
  const picks=[];
  for(let k=1;k<=PACK;k++) for(let s=1;s<=NN;s++){
    let idx=((s-1)+step*(k-1))%NN; idx=((idx%NN)+NN)%NN; const opener=idx+1;
    picks.push({phase:"booster", round:ROUND, pick:k, seat:s, card:remaining[opener].shift(), token:opener});
  }
  const leaders=[]; for(let s=1;s<=NN;s++) leaders.push({phase:"leader", round:1, pick:1, seat:s, card:`SOR-${String(40+s).padStart(3,"0")}`});
  return { draft:{ id:"demo", set:"SOR", date:"demo data — replace me",
    seats:st, config:{ pack_size:PACK, protagonist_seat:3,
      pass_directions:{ leader:"right", "1":"left", "2":"right", "3":"left" } } },
    packs, picks:[...leaders, ...picks] };
}

(async function start(){
  // 1) draft: pasted override, else fetch draft-data.json, else the built-in demo
  let draft = (typeof DRAFT_OVERRIDE !== "undefined" && DRAFT_OVERRIDE) ? DRAFT_OVERRIDE : null;
  if(!draft){
    try { draft = await fetch("draft-data.json").then(r => { if(!r.ok) throw 0; return r.json(); }); }
    catch(_) { draft = buildDemoDraft(); }
  }
  // 2) card metadata for filter/sort (optional — needs cards.json next to this file)
  try {
    const cards = await fetch("cards.json").then(r => { if(!r.ok) throw 0; return r.json(); });
    buildMeta(cards);
  } catch(_) { /* no metadata: filters/sort stay off, pool shows in pick order */ }
  boot(draft);
  if(metaLoaded){ buildAspectToggles(); document.getElementById("poolTools").hidden = false; }
})();
</script>
